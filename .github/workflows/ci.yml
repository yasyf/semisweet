name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

# Every cargo invocation installs rustc 1.90.0 — the exact channel pinned by
# rust-toolchain.toml and Cargo.toml `rust-version`. Pinning the action ref means CI
# never floats onto a machine default older than the crate's floor.

jobs:
  rust:
    name: rust (fmt + clippy + test, all features)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@1.90.0
        with:
          components: rustfmt, clippy

      # cargo test/clippy compile pyo3 in non-extension-module mode, so they link a
      # real interpreter (>= the crate's abi3-py39 floor). uv provides 3.13;
      # activate-environment puts it on PATH and exports VIRTUAL_ENV so pyo3's build
      # script selects it.
      - uses: astral-sh/setup-uv@v8.2.0
        with:
          python-version: "3.13"
          activate-environment: true
          enable-cache: true

      - uses: Swatinem/rust-cache@v2

      - name: cargo fmt --check
        run: cargo fmt --all --check

      # --all-features pulls in the ONNX backends (local-embed + gliner); their shared
      # ort 2.0 build script downloads a prebuilt ONNX Runtime, which the hosted
      # runner's network allows. --all-targets lints the tests and the daemon bin too.
      - name: cargo clippy (all features, warnings as errors)
        run: cargo clippy --all-targets --all-features -- -D warnings

      # Default features: 95 pass, 4 ignored (live Voyage/turbopuffer, MinIO, BGE).
      - name: cargo test (default features)
        run: cargo test

      # All features: 97 pass, 6 ignored. The ignored tests need live keys, Docker, or
      # model downloads; they stay ignored here, so only the offline tests run.
      - name: cargo test (all features)
        run: cargo test --all-features

  python:
    name: python (maturin build + import smoke + offline pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@1.90.0

      - uses: astral-sh/setup-uv@v8.2.0
        with:
          python-version: "3.13"
          activate-environment: true
          enable-cache: true

      - uses: Swatinem/rust-cache@v2

      # Default features only: the import smoke test and the two eager-validation
      # pytest cases (ValueError) need no model, so this build skips the ort download
      # and stays deterministic. The BGE-backed roundtrip tests self-skip via
      # @needs_model because .fastembed_cache is empty here; python-model-e2e runs them.
      - name: build + install semisweet into the venv
        run: uvx maturin develop --uv

      - name: import smoke test
        run: python -c "import semisweet"

      # Required surface: the two offline ValueError cases run; the three model-backed
      # cases self-skip (no BGE on disk). Deterministic, no network at test time.
      - name: pytest (offline; model-backed tests self-skip)
        run: pytest tests/ -v

  python-model-e2e:
    name: python model e2e (BGE-backed pytest) [non-blocking]
    runs-on: ubuntu-latest
    # Non-blocking: a flaky HF model download must not fail the required surface.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@1.90.0

      - uses: astral-sh/setup-uv@v8.2.0
        with:
          python-version: "3.13"
          activate-environment: true
          enable-cache: true

      - uses: Swatinem/rust-cache@v2

      # tests/test_python_api.py hardcodes this path; @needs_model skips when it is
      # absent. Cache it so a warm run never re-downloads BGE.
      - name: cache BGE model
        uses: actions/cache@v4
        with:
          path: .fastembed_cache
          key: bge-small-en-v1.5-v1

      # Pre-download BGE through the exact fastembed code path, into the path the
      # tests check, so @needs_model lets the roundtrip tests run instead of skipping.
      - name: pre-download BGE into .fastembed_cache
        run: cargo test --features local-embed --lib embeds_unit_norm_and_deterministic -- --ignored
        env:
          SEMISWEET_MODEL_CACHE: ${{ github.workspace }}/.fastembed_cache

      # local-embed so the in-process daemon (semisweet._run_daemon) carries the BGE
      # backend the builder selects.
      - name: build + install semisweet (local-embed) into the venv
        run: uvx maturin develop --uv --features local-embed

      # Full suite: BGE-backed roundtrip + the offline cases. The fixture monkeypatches
      # SEMISWEET_MODEL_CACHE to .fastembed_cache; HF_HOME gives hf-hub a writable home.
      - name: pytest (full; BGE-backed roundtrip + offline)
        run: pytest tests/ -v
        env:
          SEMISWEET_MODEL_CACHE: ${{ github.workspace }}/.fastembed_cache
          HF_HOME: ${{ github.workspace }}/.hf_home

  rust-s3-minio:
    name: rust s3 e2e (MinIO via testcontainers) [non-blocking]
    runs-on: ubuntu-latest
    # Non-blocking: container pull/startup is an external dependency.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@1.90.0

      - uses: astral-sh/setup-uv@v8.2.0
        with:
          python-version: "3.13"
          activate-environment: true
          enable-cache: true

      - uses: Swatinem/rust-cache@v2

      # The object_s3 e2e starts its own MinIO container through testcontainers
      # (SyncRunner) on the Docker daemon preinstalled on ubuntu-latest, so no
      # services: block is needed — the test reads the dynamically-mapped port. Scope
      # to the single ignored MinIO test so the live Voyage/turbopuffer ignored tests
      # (no keys here) are never run.
      - name: cargo test (MinIO object store roundtrip)
        run: cargo test --features s3 --lib round_trips_objects_against_minio -- --ignored

  rust-model-e2e:
    name: rust model e2e (daemon serving over BGE) [non-blocking]
    runs-on: ubuntu-latest
    # Non-blocking: depends on the BGE model download.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@1.90.0

      - uses: astral-sh/setup-uv@v8.2.0
        with:
          python-version: "3.13"
          activate-environment: true
          enable-cache: true

      - uses: Swatinem/rust-cache@v2

      - name: cache BGE model
        uses: actions/cache@v4
        with:
          path: .fastembed_cache
          key: bge-small-en-v1.5-v1

      # daemon_serving spawns the real semisweet-daemon (built with local-embed) and
      # drives it through the public ClientStub. The test points SEMISWEET_MODEL_CACHE
      # at .fastembed_cache itself, so the cached/downloaded BGE is reused.
      - name: cargo test (daemon serving roundtrip)
        run: cargo test --features local-embed --test daemon_serving -- --ignored
